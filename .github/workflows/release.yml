name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: ytpgui-mac-universal
            ext: ''
            buildtags: ''
          - os: windows-latest
            platform: windows/amd64
            artifact: ytpgui-windows-amd64
            ext: '.exe'
            buildtags: ''
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: ytpgui-linux-amd64
            ext: ''
            buildtags: '-tags webkit2_41'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.buildtags }}

      - name: Package artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: cd build/bin && zip -r ${{ matrix.artifact }}.zip ytpgui.app

      - name: Rename artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv build/bin/ytpgui build/bin/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item build\bin\ytpgui${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}
        shell: pwsh

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}.zip

      - name: Upload artifact (non-macOS)
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
